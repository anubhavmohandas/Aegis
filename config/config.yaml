# Aegis configuration.
# API keys are NOT set here -- name the environment variable that holds the key
# in ai.api_key_env instead, so you never accidentally commit a key.

# The AI layer talks to any OpenAI-compatible endpoint: only base_url and model
# change between providers, never the code. Shipped default is NVIDIA Build's
# free endpoint. Other examples:
#
#   OpenAI:      base_url: https://api.openai.com/v1        api_key_env: OPENAI_API_KEY     model: gpt-4.1-mini
#   OpenRouter:  base_url: https://openrouter.ai/api/v1     api_key_env: OPENROUTER_API_KEY model: <any>
#   Ollama:      base_url: http://localhost:11434/v1        api_key_env: OLLAMA_API_KEY     model: llama3 (key can be any non-empty value)
#
# Anthropic's API is not OpenAI-shaped, so it keeps its own provider value:
#   provider: anthropic   api_key_env: ANTHROPIC_API_KEY   model: claude-sonnet-5   (base_url ignored)
ai:
  provider: openai-compatible   # "openai-compatible" or "anthropic"
  base_url: https://integrate.api.nvidia.com/v1
  api_key_env: NVIDIA_API_KEY
  model: nvidia/nemotron-3-ultra-550b-a55b
  temperature: 0.2              # low on purpose: explanations should be consistent and boring, not creative

# Leave empty to auto-default to Desktop/Downloads/Documents in your home folder.
watched_folders: []

poll_interval_seconds: 3      # used by every polling-based monitor (registry, login items, USB on Mac, WMI fallback)

# Master switch for OS desktop popups. Default OFF -- the dashboard timeline
# already shows every event live, so popups are an opt-in interruption, not
# the primary way to see activity. Everything below only matters if this is true.
notify_enabled: false
notify_on_startup_scan: true

# Popup severity floor: low | medium | high | critical.
# "low" = notify on everything (v1 behavior). "high" = only interrupt for
# high/critical. This gates ONLY the desktop popup -- events below the floor
# are still AI-explained, logged, and stored in the timeline (that's where
# you review what you opted out of being interrupted for). Invalid values
# fall back to "low" with a warning, never to silence.
notify_min_severity: low
log_path: events.log
db_path: aegis_events.db      # SQLite event history read by ui/timeline_app.py

# Opt-in noise reduction (see core/rule_engine.py for why this is NOT a
# built-in "known safe" list -- it only skips the AI call for things YOU
# add here, e.g. your own dev tools that fire constantly).
trusted_process_names:        # populated from your real macOS test run -- routine
                               # system daemons that were firing constantly and
                               # adding no signal. Remove any of these if you'd
                               # rather keep seeing them; add more the same way.
  - mdworker_shared
  - biomesyncd
  - FolderActionsDispatcher
  - com.apple.iCloudHelper
  - AddressBookSourceSync
  - AddressBookManager
  - system_profiler
  - UVFSService
  - PlugInLibraryService
  - mdsync
  # Deliberately NOT auto-added: "Disk Utility", "Messages", "Brave Browser
  # Helper" -- these are user-facing apps, not background daemons. Their
  # launches are a real signal (e.g. Disk Utility launching unexpectedly is
  # worth knowing about), so silencing them by default trades away visibility
  # you may actually want. Add them yourself if you've decided otherwise for
  # your own machine.
trusted_process_hashes: []    # sha256 of a trusted binary's file on disk -- harder to spoof than a
                               # name match, since it requires replacing the actual file at that path
                               # rather than just naming something the same thing. Get one locally with
                               # `shasum -a 256 /path/to/binary` (mac/linux) or `certutil -hashfile
                               # C:\path\to.exe SHA256` (Windows), then paste the hex digest here.
                               # NOT YET VALIDATED against a real locked/running Windows or macOS
                               # process -- see core/rule_engine.py's docstring caveat.
trusted_usb_ids: []           # e.g. ["usb\\vid_0781&pid_5581\\...\\"] (Windows DeviceID) or a Mac serial_num

# Opt-in threat enrichment (see core/enrichment.py). When true, high/critical
# events get evidence attached before the AI explanation:
#   - a VirusTotal hash lookup for the executable/file involved (hash-only --
#     the file itself is NEVER uploaded), cached in SQLite so a repeated
#     binary costs one lookup and cached verdicts work offline
#   - local MITRE ATT&CK technique annotations (offline, no API)
# Default OFF because querying a hash discloses that hash to VirusTotal.
# The VT API key is not stored here: set the VT_API_KEY environment variable
# (or a VT_API_KEY line in .env). Free-tier keys: https://www.virustotal.com
enrich_enabled: true
